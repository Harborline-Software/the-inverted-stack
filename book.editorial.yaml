# Editorial profile for the-inverted-stack.
#
# Author-owned configuration consumed by the galley/prose pipeline. The
# galley settings UI lays an overlay on top of this file at
# `.galley/editorial.json` (preset scaling + narrator voice); the
# pipeline reads both via `BookProfile.from_book_root`.
#
# This file is the authoritative source for the three voice detectors
# (filter_words, motif_overuse, self_referential_frame) that previously
# lived as hardcoded constants in `build/prose_telemetry_handcount.py`.
# Updating phrases / verbs / caps happens here; the handcount script's
# duplicate detectors are scheduled for removal.

book_id: the-inverted-stack
voice: anna
genre: literary-fiction

detectors:

  # ─── filter_words ─────────────────────────────────────────────────────
  # Narrator-distance verbs of the form "I <verb>" that filter sensory
  # experience through the narrator instead of presenting it directly.
  # Anna's profile currently uses these heavily by design (Janeway /
  # formal-narrator register). Reducing them is one of the highest-yield
  # moves toward immediacy when the register needs to shift.
  filter_words:
    filter_words:
      - felt
      - saw
      - noticed
      - realized
      - realised
      - registered
      - observed
      - watched
      - sensed
      - thought
      - wondered
      - considered
      - recognized
      - recognised
      - understood
      - knew
      - believed
      - imagined
      - remembered
      - recalled
      - experienced
      - perceived
      - decided
      - figured
      - determined

  # ─── motif_overuse ────────────────────────────────────────────────────
  # Two-layer Anna-voice motif management. `retired_motifs` is a hard
  # blacklist — any occurrence is a finding. `motifs` is a soft-cap
  # dictionary (phrase → max-allowed count per chapter); findings emit
  # for every occurrence past the cap. Source: ANNA-VOICE.md anti-pattern
  # #5 (retired) + per-chapter cap discipline (capped).
  motif_overuse:
    retired_motifs:
      - what it claimed to be
      - what they claimed to be
      - what he claimed to be
      - what she claimed to be
    motifs:
      "noted and did not yet": 1
      "I am writing this here": 1
      "I am going to tell you": 1
      "I am going to write": 1
      "in this account": 1
      "the smallest possible": 1
      "this version of the account": 1
      "I am leaving it in": 1
    # Verdict thresholds: any retired/over-cap finding warns; 3+ blocks.
    warning_raw_count: 1
    blocker_raw_count: 3

  # ─── lexical_chain_loop ───────────────────────────────────────────────
  # Anna's high-frequency register words that recur as voice signature,
  # not as loops. These are book-specific extensions on top of the
  # galley/prose generic English stopword default.
  lexical_chain_loop:
    stopwords:
      - consortium
      - architecture
      - mission

  # ─── nominalization (spaCy) ───────────────────────────────────────────
  # POS-verified abstract nouns ending in -tion / -sion / -ment / -ance /
  # -ence / -ity / -ness. The galley detector ships with default soft
  # caps for common abstract nouns (question, conversation, decision,
  # moment, etc.); this section adds book-specific domain vocabulary on
  # top.
  #
  # `soft_caps` is a per-lemma threshold. The first N occurrences of a
  # lemma are treated as content vocabulary (not flagged). Occurrence
  # #(N+1) onward fires as a finding with `over_cap_by` indicating how
  # much over the cap. Reasonable caps reflect "how many times can this
  # word naturally appear in a chapter before it feels like over-use."
  nominalization:
    extra:
      soft_caps:
        # technical / domain vocabulary
        mission: 12        # chapter subject; expected heavy mention
        partition: 8       # technical term central to the architecture
        operation: 4
        selection: 5       # frontmatter + body
        architecture: 8    # repeated by design across council chapters
        recruitment: 4     # chapter title
        migration: 4       # schema-migration technical
        protocol: 8        # central technical term
        sentence: 5        # held in the "He did not soften..." cascade
        assumption: 4      # "the assumption I missed" — load-bearing
        submission: 3      # Round Two submission
        procurement: 2     # consortium / sovereignty vocabulary
        registration: 2    # selection-archive noise
        authority: 3       # architecture's authority (closing chant)

  # ─── distributed_chiasmus (spaCy) ─────────────────────────────────────
  # ABBA lemma reversal. The galley detector ships with built-in
  # reduced-confidence lemmas for universal cross-pair noise (speech /
  # motion / perception verbs, temporal nouns, body parts, generic
  # narrative nouns). Pairs touching those lemmas are still surfaced in
  # findings but at confidence 0.4 (vs. 0.7 for full-rhetoric matches),
  # so they don't trip warnings unless aggregate density spikes.
  #
  # `stopwords` here ADDS book-specific scene / staging vocabulary to
  # the reduced-confidence set. Pairs touching these lemmas join the
  # universal noise band — still detectable, not warning-worthy on
  # their own.
  distributed_chiasmus:
    stopwords:
      - record              # "He spoke into the record... speaks into the record" (held)
      - speak               # paired with record in the closing chant
      - printout            # interview-prop staging
      - office              # bakery + St. Petersburg scene anchor
      - counter             # bakery-counter staging
      - fill                # silence-fill counting
      - silence             # Anna's silence-counting move
      - rewrite             # lease-protocol vocabulary
      - protocol            # technical
      - operational         # mission-as-survival vocabulary

  # ─── self_referential_frame ───────────────────────────────────────────
  # Staff-history meta-frame phrases. Per ANNA-VOICE.md anti-pattern #6,
  # these are author-of-the-account devices the narrator should use
  # sparingly. Threshold: >1 per chapter = warning, >3 = blocker.
  self_referential_frame:
    self_referential_frames:
      - I am writing this here
      - I am going to write
      - I am going to tell you
      - in this account
      - the staff history
      - for the record
      - on the record
      - in retrospect
      - this version of the account
      - I am leaving it in
      - I am leaving the reading in
    warning_raw_count: 2
    blocker_raw_count: 4
